name: weekly-preview
on:
  schedule:
    # User-requested 2026-05-23: weekend silence except Sat 06:00 ICT.
    # Two attempts only:
    #   Sat 06:00 ICT → main delivery slot
    #   Mon 04:00 ICT → last-chance backup BEFORE the trading week opens,
    #                   in case Saturday cron dropped on GH free tier
    # The middle Sun 06:00 ICT backup was removed to keep the weekend
    # silent. ISO-week sent_log key gates double-sends.
    - cron: "0 23 * * 5"   # Fri 23:00 UTC = Sat 06:00 ICT — main slot
    - cron: "0 21 * * 0"   # Sun 21:00 UTC = Mon 04:00 ICT — last chance
  workflow_dispatch: {}

concurrency:
  group: gold-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
      LINE_NEWS_TARGET:   ${{ secrets.LINE_NEWS_TARGET }}
      LINE_HEALTH_TARGET: ${{ secrets.LINE_HEALTH_TARGET }}
      GSHEET_ID:          ${{ secrets.GSHEET_ID }}
      GSHEET_CREDS:       ${{ secrets.GSHEET_CREDS }}
      PYTHONUNBUFFERED:   "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.main --mode weekly_preview
