name: weekly-preview
on:
  schedule:
    # Three attempts — FF free JSON only ships ISO-week-current data and
    # rolls over Sunday morning ET (Saturday night UTC). Saturday-morning
    # ICT will usually find no next-week events yet, so we retry Sunday
    # and Monday-early. The ISO-week sent_log key gates double-sends, so
    # whichever attempt first finds the new week wins.
    - cron: "0 23 * * 5"   # Fri 23:00 UTC = Sat 06:00 ICT
    - cron: "0 23 * * 6"   # Sat 23:00 UTC = Sun 06:00 ICT (likely has next-week data)
    - cron: "0 21 * * 0"   # Sun 21:00 UTC = Mon 04:00 ICT (last chance)
  workflow_dispatch: {}

concurrency:
  group: gold-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
      LINE_NEWS_TARGET:   ${{ secrets.LINE_NEWS_TARGET }}
      LINE_HEALTH_TARGET: ${{ secrets.LINE_HEALTH_TARGET }}
      GSHEET_ID:          ${{ secrets.GSHEET_ID }}
      GSHEET_CREDS:       ${{ secrets.GSHEET_CREDS }}
      PYTHONUNBUFFERED:   "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.main --mode weekly_preview
