name: watchdog
on:
  schedule:
    # Every 30 min. Reads:
    #   - pipeline heartbeat from source_state (written by news-cron / event-mode)
    #   - FF scraper success streak
    #   - classifier counters (fallback ratio)
    #   - per-source classifier counters (reject rate)
    #   - GitHub Actions API for failed runs in last 24h
    # Pushes a LINE health alert when any of the above trips. Cooldown
    # 120 min per (source, warning_type) so an outage doesn't spam.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: gold-news-watchdog
  cancel-in-progress: false

# `actions: read` is needed for check_recent_workflow_failures().
# GITHUB_TOKEN is auto-provided by Actions runner.
permissions:
  actions: read
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
      LINE_HEALTH_TARGET: ${{ secrets.LINE_HEALTH_TARGET }}
      GSHEET_ID: ${{ secrets.GSHEET_ID }}
      GSHEET_CREDS: ${{ secrets.GSHEET_CREDS }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.main --mode watchdog
