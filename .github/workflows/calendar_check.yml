name: calendar-check
on:
  schedule:
    # Weekdays only — economic releases concentrate Mon–Fri.
    # Pre-release window is [15, 25) minutes; running every 10 min catches every event.
    - cron: "*/10 * * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: gold-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
      LINE_NEWS_TARGET:   ${{ secrets.LINE_NEWS_TARGET }}
      LINE_HEALTH_TARGET: ${{ secrets.LINE_HEALTH_TARGET }}
      GSHEET_ID:          ${{ secrets.GSHEET_ID }}
      GSHEET_CREDS:       ${{ secrets.GSHEET_CREDS }}
      FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
      PYTHONUNBUFFERED:   "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.main --mode calendar_check
