name: _gemini_smoke
# Temporary: prove GEMINI_API_KEY works on the free tier (real classify call).
# Delete after verification.
on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Gemini raw REST smoke
        run: |
          python - <<'PY'
          import os, httpx, json
          k = os.environ.get("GEMINI_API_KEY", "").strip()
          print("=== GEMINI RAW SMOKE ===")
          print("key present:", bool(k), "len:", len(k), "prefix:", (k[:4] if k else ""))
          url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent"
          body = {"contents": [{"parts": [{"text": "reply with the single word ok"}]}]}
          try:
              r = httpx.post(url, json=body, headers={"x-goog-api-key": k}, timeout=30.0)
              print("STATUS:", r.status_code)
              print("BODY:", r.text[:400])
          except Exception as e:
              print("EXC:", repr(e)[:300])
          PY
