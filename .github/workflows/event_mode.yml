name: event-mode
on:
  repository_dispatch:
    types: [news-event-mode]   # fired by News Calendar Bot v2.6 ~5m before CPI/NFP/FOMC
  workflow_dispatch:
    inputs:
      duration_min:
        description: "Loop duration in minutes"
        default: "30"
      sleep_sec:
        description: "Sleep between iterations (sec)"
        default: "60"

concurrency:
  group: gold-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
      LINE_NEWS_TARGET: ${{ secrets.LINE_NEWS_TARGET }}
      LINE_HEALTH_TARGET: ${{ secrets.LINE_HEALTH_TARGET }}
      GSHEET_ID: ${{ secrets.GSHEET_ID }}
      GSHEET_CREDS: ${{ secrets.GSHEET_CREDS }}
      # Optional — Claude Haiku classify+rewrite for breaking/alert during CPI/NFP/FOMC.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Optional — Gemini secondary classifier (used when Claude unavailable).
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run event-mode loop
        run: |
          DUR="${{ github.event.client_payload.duration_min || inputs.duration_min || '30' }}"
          SLP="${{ github.event.client_payload.sleep_sec || inputs.sleep_sec || '60' }}"
          python -m src.main --mode event --event-duration-min "$DUR" --event-sleep-sec "$SLP"
