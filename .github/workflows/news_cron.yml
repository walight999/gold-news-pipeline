name: news-cron
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: gold-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
      LINE_NEWS_TARGET: ${{ secrets.LINE_NEWS_TARGET }}
      LINE_HEALTH_TARGET: ${{ secrets.LINE_HEALTH_TARGET }}
      GSHEET_ID: ${{ secrets.GSHEET_ID }}
      GSHEET_CREDS: ${{ secrets.GSHEET_CREDS }}
      # Optional — Claude Haiku translator for breaking/alert/digest. Falls
      # back to Google Translate (free) when unset.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Optional — Apify X/Twitter fast-news scraper. No-op when unset.
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.main --mode cron
