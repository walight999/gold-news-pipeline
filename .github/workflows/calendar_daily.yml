name: calendar-daily
on:
  schedule:
    # ONE daily card (the "main" pre-session briefing) to match the retired GAS
    # bot's single 00:00-ICT card. The "early" 00:05-ICT slot is intentionally
    # NOT scheduled (the code still supports it — add a 17:05 UTC trigger to
    # re-enable). Throttled native cron is the fallback; cron-job.org fires it
    # on time at 21:40 UTC. sent_log dedups the two so it's 1 card/day.
    - cron: "40 21 * * *"   # 21:40 UTC = 04:40 ICT — pre-session briefing
                            # (sits inside 04:00-05:00 ICT quiet window but
                            # bypass_quiet=True allows the morning send)
  workflow_dispatch: {}

concurrency:
  group: gold-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
      LINE_NEWS_TARGET:   ${{ secrets.LINE_NEWS_TARGET }}
      LINE_HEALTH_TARGET: ${{ secrets.LINE_HEALTH_TARGET }}
      GSHEET_ID:          ${{ secrets.GSHEET_ID }}
      GSHEET_CREDS:       ${{ secrets.GSHEET_CREDS }}
      PYTHONUNBUFFERED:   "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.main --mode calendar_daily
