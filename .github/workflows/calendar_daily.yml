  name: calendar-daily
  on:
    schedule:
      - cron: "5 17 * * *"    # 17:05 UTC = 00:05 ICT — start-of-day briefing
                              # (catches 00:00-04:39 events the 04:40 push would
                              # only warn about via T-15 calendar_check)
      - cron: "40 21 * * *"   # 21:40 UTC = 04:40 ICT — pre-session briefing
                              # (sits inside 04:00-05:00 ICT quiet window but
                              # bypass_quiet=True allows the morning send)
    workflow_dispatch: {}

  concurrency:
    group: gold-news
    cancel-in-progress: false

  jobs:
    run:
      runs-on: ubuntu-latest
      timeout-minutes: 4
      env:
        LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
        LINE_NEWS_TARGET:   ${{ secrets.LINE_NEWS_TARGET }}
        LINE_HEALTH_TARGET: ${{ secrets.LINE_HEALTH_TARGET }}
        GSHEET_ID:          ${{ secrets.GSHEET_ID }}
        GSHEET_CREDS:       ${{ secrets.GSHEET_CREDS }}
        PYTHONUNBUFFERED:   "1"
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.11"
            cache: pip
        - run: pip install -r requirements.txt
        - run: python -m src.main --mode calendar_daily
