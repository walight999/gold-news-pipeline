name: calendar-daily
on:
  schedule:
    - cron: "30 23 * * *"   # 23:30 UTC = 06:30 ICT
  workflow_dispatch: {}

concurrency:
  group: gold-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
      LINE_NEWS_TARGET:   ${{ secrets.LINE_NEWS_TARGET }}
      LINE_HEALTH_TARGET: ${{ secrets.LINE_HEALTH_TARGET }}
      GSHEET_ID:          ${{ secrets.GSHEET_ID }}
      GSHEET_CREDS:       ${{ secrets.GSHEET_CREDS }}
      PYTHONUNBUFFERED:   "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.main --mode calendar_daily
