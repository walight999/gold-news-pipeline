topics:
  inflation:
    base_impact: 5
    keywords:
      - cpi
      - "core cpi"
      - pce
      - "core pce"
      - ppi
      - "core ppi"
      - inflation
      - "inflation expectations"
      - "consumer prices"
      - "wage growth"
      - wages
      - disinflation
      - stagflation
    entities:  [us, bls, fed, eurozone, uk, japan]

  jobs:
    base_impact: 5
    keywords:
      - nfp
      - "non-farm"
      - nonfarm
      - payrolls
      - "employment change"
      - "jobs report"
      - "unemployment rate"
      - unemployment
      - "jobless claims"
      - "initial claims"
      - "continuing claims"
      - "labor market"
      - "labour market"
      - "wage growth"
      - "average hourly earnings"
    entities:  [us, bls, eurozone, uk]

  rate_policy:
    base_impact: 4
    keywords:
      - fed
      - powell
      - fomc
      - "rate cut"
      - "rate hike"
      - "higher for longer"
      - "restrictive"
      - "accommodative"
      - dots
      - "dot plot"
      - "rate decision"
      - "federal funds"
      - ecb
      - lagarde
      - "deposit facility"
      - boj
      - ueda
      - boe
      - bailey
      # named Fed officials commonly quoted
      - williams
      - bostic
      - goolsbee
      - waller
      - kashkari
      - brainard
      - daly
      - mester
      - barr
    entities:  [fed, ecb, boj, boe]

  geopolitics:
    base_impact: 4
    keywords:
      # Mideast core
      - iran
      - israel
      - hormuz
      - gaza
      - "west bank"
      - hamas
      - hezbollah
      - lebanon
      - syria
      - yemen
      - houthi
      - houthis
      - "red sea"
      # Russia / Ukraine
      - russia
      - ukraine
      - kremlin
      - moscow
      # East Asia
      - "north korea"
      - taiwan
      - "south china sea"
      - "cross-strait"
      # Generic conflict / weapons
      - missile
      - drone
      - war
      - ceasefire
      - airstrike
      - "air strike"
      - "missile strike"
      - "rocket attack"
      - bombing
      - "ground operation"
      - "ground invasion"
      - "military operation"
      - "military strike"
      - "military aid"
      - ballistic
      - escalation
      - "de-escalation"
      - retaliation
      - evacuation
      - jihadist
      - militants
      - militia
      - nato
      # Trade / economic warfare
      - "trade war"
      - tariff
      - tariffs
      - sanctions
      - "safe haven"
      - "flight to safety"
    entities:  [mideast, us, china, russia, israel, ukraine]

  usd_yields:
    base_impact: 3
    # Known under-scoring: real-yield / DXY breakout impact really sits at ~4
    # but needs price context. Phase 3 calibrates from xau_return_*. Don't
    # raise the static weight here without that data.
    keywords:
      - dxy
      - "dollar index"
      - dollar
      - greenback
      - yields
      - "real yields"
      - "real-yield"
      - treasury
      - "10-year"
      - "10y yield"
      - "2-year"
      - "yield curve"
      - "bond auction"
      - tnx
    entities:  [us]

  gold_flow:
    base_impact: 3
    keywords:
      - gold
      - xau
      - bullion
      - "central bank buying"
      - "central-bank buying"
      - pboc
      - "gold reserves"
      - "etf inflows"
      - "etf outflows"
      - wgc
      - "world gold council"
      - "spot gold"
    entities:  [wgc, pboc]

  growth:
    base_impact: 2
    keywords:
      - gdp
      - recession
      - "retail sales"
      - "consumer confidence"
      - "consumer sentiment"
      - "durable goods"
      - ism
      - pmi
      - "industrial production"
      - "manufacturing pmi"
      - "services pmi"
      - "leading index"
    entities:  [us, eurozone, uk, china, japan]

