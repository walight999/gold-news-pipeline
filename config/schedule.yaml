digest:
  # All times Asia/Bangkok (ICT). 6 windows spaced 4h apart so each "News
  # Update" round covers the news of the 4h window that just ended. A digest
  # fires if a run lands from window_minutes BEFORE a slot up to
  # catch_up_minutes AFTER it (once per slot per day via already_sent). The
  # catch-up exists because GitHub throttles the */5 news cron down to roughly
  # one run every 2-4h, so the old tight ±5m window was almost always missed.
  #
  # 2026-06-22: 3 slots → 6 (04:30/08:30/12:30/16:30/20:30/00:30). Each round
  # now scans the WHOLE 4h window from event_state (not just the current
  # fetch) and sends at most `max_cards` events, ONE full-detail Flex bubble
  # each (headline + body + source ref) instead of cramming many thin cards.
  slots_ict: ["04:30", "08:30", "12:30", "16:30", "20:30", "00:30"]
  window_minutes: 5
  # 210 (3.5h) < the 4h slot spacing, so a throttled run still catches a
  # missed slot but a late fire can't bleed into the next window's slot.
  catch_up_minutes: 210
  # How far back the window scan reaches from event_state for each round.
  # Matches the 4h slot spacing so consecutive rounds tile the day with no
  # gap and no overlap (sent_log dedup stops an event repeating across rounds).
  window_hours: 4
  # Max events sent per round = max full-detail Flex bubbles in the carousel.
  max_cards: 4
  max_events: 12    # classify pool ceiling: rank window candidates by score,
                    # classify down the list until max_cards keepers are found.
  # Lower than spec §4.5's 2.5 — see main.run_once digest section for why.
  # Most RSS items have published_ts that's hours old by the time we
  # fetch, so freshness_factor drops to 0.1 and even base-5 inflation
  # articles only score 0.5. 0.5 gives us a usable digest pool.
  min_score: 0.5
  # Degraded-mode safety net (2026-06-22). The quality gate normally drops any
  # event that only got a literal Google-translate fallback (both Claude AND
  # Gemini unavailable). When TRUE, if a WHOLE round produces zero real
  # classifications (full classifier outage — e.g. Anthropic monthly spend cap
  # hit AND Gemini free-tier quota exhausted), the round publishes the top
  # fallback cards instead of going silent, clearly flagged "โหมดสำรอง" so the
  # reader knows the Thai is machine-translated. A round with ANY real
  # classification never uses this path, so a one-off transient never leaks a
  # degraded card. Set FALSE to restore strict quality-first (silent on outage).
  allow_fallback_when_ai_down: true

session:
  # Active-session gate (ICT). London open → NY close.
  active_start_ict: "14:00"
  active_end_ict:   "04:00"   # next-day wrap allowed

rate_limit:
  breaking_alert_window_minutes: 15
  breaking_alert_max: 5

quiet_hours:
  # Forex/gold market closes around 04:00 ICT (NY close) and reopens with
  # the Asian session 05:00 ICT — that one-hour gap is the quiet window.
  # 00:00-04:00 ICT pushes still go through (US session is live).
  # 04:40 ICT calendar_daily is exempt (the morning briefing should land
  # exactly here, before the trader sits down).
  enabled: true
  start_ict: "04:00"
  end_ict:   "05:00"

routing:
  # When true, BREAKING (score >= 4.5) requires either an official source
  # (fed/bls/ecb/treasury) OR source_count >= 2. Suppresses single-source
  # spam (e.g. ForexLive firing 5 inflation BREAKING in 5 minutes).
  # Default false — matches spec §4.5 verbatim. Flip to true after the
  # run-log shows the noise floor justifies tightening.
  breaking_require_confirmation: false

retention:
  # Daily `--mode maintain` purges rows older than these thresholds.
  event_state_days: 7
  sent_log_days:    30
  # calibration_log keeps ~6 months — enough history for the precision report /
  # weight tuning, while bounding growth (it's loaded every run). health_log is
  # operational noise; 90 days is plenty for incident review.
  calibration_log_days: 180
  health_log_days:      90

health:
  # Cooldown for repeating the same (source_id, warning_type) warning.
  alert_cooldown_minutes: 60
  validator_revalidate_hours: 24
  # Bumped from 60/30 — Tier 1-2 sources naturally go quiet during slow
  # hours; tighter thresholds were producing 2-3 sources flapping at
  # different cadences. Real outages (HTTP errors) still escalate via
  # http_consecutive_errors_threshold without needing these to be tight.
  tier1_no_success_minutes: 120
  tier2_no_item_minutes: 60
  http_consecutive_errors_threshold: 3

calendar:
  # ForexFactory free weekly JSON. Refreshes every few hours upstream.
  source_url: "https://nfs.faireconomy.media/ff_calendar_thisweek.json"

  # Daily push at 04:40 ICT — full day's events worth knowing about.
  daily_push_ict: "04:40"
  # 7 currencies XAU traders watch. CHF rarely appears in FF (SNB is quiet)
  # but include for forward compatibility.
  daily_currencies: [CAD, CHF, CNY, EUR, GBP, JPY, USD]
  daily_impacts:    [High, Medium]

  # Pre-release alert (T-15) — broad currency set, both impacts. FF free data
  # gives ~4-12 such events per day, so expect 4-12 pre-release pushes.
  # Tighten back to High-only if it gets spammy after a week of data.
  #
  # pre_release_enabled: true since 2026-06-24 — MIGRATED back off the GAS
  # newsupdate-linebot. cron-job.org now drives calendar_check every 10 min
  # reliably 24/7, so the [15,25)-min pre-release window is hit on time without
  # GAS (the GHA-cron throttle that forced the move to GAS in the first place is
  # gone). The GAS upcoming triggers are retired in the same cutover, so no
  # double cards. sent_log (`precal:{event_id}`) dedups per event, so two
  # near-simultaneous calendar_check runs never double-send. Window fires the
  # card at ~T-15..T-25 (GAS fired exactly at T-15 — a few min earlier here).
  pre_release_enabled: true
  pre_release_window_low_min:  15   # alert if event is >= this many minutes out
  pre_release_window_high_min: 25   # ... and < this many minutes out
  pre_release_currencies: [CAD, CHF, CNY, EUR, GBP, JPY, USD]
  pre_release_impacts:    [High, Medium]

  # Post-release alert — fires once after release (sent_log idempotency), with
  # the FRED/FF actual when supported. The window looks BACK far enough that a
  # throttled calendar-check still catches recent releases: GitHub drops the
  # */10 cron to ~one run every few hours, so a tight [-15,0) window missed
  # every release. -180 = report any High/Medium release from the last 3h that
  # hasn't been sent yet. The XAU-reaction is still measured at release+5m from
  # historical price, so a late-delivered card is still accurate.
  post_release_window_low_min:  -180
  post_release_window_high_min:    0
