digest:
  # All times Asia/Bangkok (ICT). ±5m window around each slot triggers a digest build.
  slots_ict: ["05:30", "13:30", "21:30"]
  window_minutes: 5
  max_events: 10
  # Lower than spec §4.5's 2.5 — see main.run_once digest section for why.
  # Most RSS items have published_ts that's hours old by the time we
  # fetch, so freshness_factor drops to 0.1 and even base-5 inflation
  # articles only score 0.5. 0.5 gives us a usable digest pool.
  min_score: 0.5

session:
  # Active-session gate (ICT). London open → NY close.
  active_start_ict: "14:00"
  active_end_ict:   "04:00"   # next-day wrap allowed

rate_limit:
  breaking_alert_window_minutes: 15
  breaking_alert_max: 5

quiet_hours:
  # When enabled, all LINE pushes (breaking/alert/digest/calendar/health)
  # are suppressed inside the window. Sheet still records everything —
  # state isn't lost, just no LINE notifications during sleep.
  enabled: true
  start_ict: "00:00"
  end_ict:   "05:00"

routing:
  # When true, BREAKING (score >= 4.5) requires either an official source
  # (fed/bls/ecb/treasury) OR source_count >= 2. Suppresses single-source
  # spam (e.g. ForexLive firing 5 inflation BREAKING in 5 minutes).
  # Default false — matches spec §4.5 verbatim. Flip to true after the
  # run-log shows the noise floor justifies tightening.
  breaking_require_confirmation: false

retention:
  # Daily `--mode maintain` purges rows older than these thresholds.
  # calibration_log is never purged (Phase 3 backfills xau_return_* there).
  event_state_days: 7
  sent_log_days:    30

health:
  # Cooldown for repeating the same (source_id, warning_type) warning.
  alert_cooldown_minutes: 60
  validator_revalidate_hours: 24
  # Bumped from 60/30 — Tier 1-2 sources naturally go quiet during slow
  # hours; tighter thresholds were producing 2-3 sources flapping at
  # different cadences. Real outages (HTTP errors) still escalate via
  # http_consecutive_errors_threshold without needing these to be tight.
  tier1_no_success_minutes: 120
  tier2_no_item_minutes: 60
  http_consecutive_errors_threshold: 3

calendar:
  # ForexFactory free weekly JSON. Refreshes every few hours upstream.
  source_url: "https://nfs.faireconomy.media/ff_calendar_thisweek.json"

  # Daily push at 04:40 ICT — full day's events worth knowing about.
  daily_push_ict: "04:40"
  # 7 currencies XAU traders watch. CHF rarely appears in FF (SNB is quiet)
  # but include for forward compatibility.
  daily_currencies: [CAD, CHF, CNY, EUR, GBP, JPY, USD]
  daily_impacts:    [High, Medium]

  # Pre-release alert — broad currency set, both impacts. FF free data
  # gives ~4-12 such events per day, so expect 4-12 pre-release pushes.
  # Tighten back to High-only if it gets spammy after a week of data.
  pre_release_window_low_min:  15   # alert if event is >= this many minutes out
  pre_release_window_high_min: 25   # ... and < this many minutes out
  pre_release_currencies: [CAD, CHF, CNY, EUR, GBP, JPY, USD]
  pre_release_impacts:    [High, Medium]

  # Post-release alert — fires once after release, directional gold impact
  # plus FRED actual when supported (US series only — CAD/CHF/etc. stay
  # directional only).
  post_release_window_low_min:  -15
  post_release_window_high_min:   0
